# Immunex Conda Environment Configuration
# Complete environment for MD analysis and TCR-pMHC structure analysis
# Usage: conda env create -f environment.yml
# Update: conda env update -f environment.yml --prune

name: immunex
channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # Python version
  - python=3.10

  # Core scientific computing
  - numpy>=1.24.0
  - pandas>=2.0.0
  - scipy>=1.10.0
  - matplotlib>=3.7.0

  # MD analysis
  - mdanalysis>=2.6.0
  # - gromacs>=2023.0  # GROMACS MD engine (use system version)

  # Structure analysis
  - biopython>=1.81
  - biotite>=0.37.0

  # CDR detection and antibody analysis
  - anarci  # Critical for CDR loop detection

  # Visualization
  - seaborn>=0.12.0

  # Parallel processing
  - joblib>=1.3.0
  - tqdm>=4.65.0  # Progress bars

  # Data formats
  - h5py>=3.8.0
  - netcdf4>=1.6.0  # For NetCDF trajectory files

  # Development and testing
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  - black>=23.0
  - flake8>=6.0
  - ipython>=8.12.0
  - jupyter>=1.0.0
  - jupyterlab>=4.0.0

  # System utilities
  - git
  - wget
  - curl

  # Optional dependencies via pip
  - pip
  - pip:
    - plotly>=5.15.0
    - kaleido>=0.2.1  # For plotly static image export
    - freesasa>=2.2.0  # SASA calculation (optional)
    - mosaic-clustering  # For advanced clustering (optional)
    - nglview>=3.0.0  # Jupyter visualization (optional)

# Notes:
# - ANARCI requires HMMER which is automatically installed via bioconda
# - GROMACS is included for convenience but can use system version
# - FreeSASA and MoSAIC are optional but recommended for full functionality
