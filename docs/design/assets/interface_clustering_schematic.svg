<svg width="1600" height="760" viewBox="0 0 1600 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5F1E8"/>
      <stop offset="1" stop-color="#EEE7D8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8F6F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#23352D" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4E6A5A"/>
    </marker>
    <style>
      .title { font: 700 34px 'DejaVu Sans', Arial, sans-serif; fill: #1E2A24; }
      .subtitle { font: 400 17px 'DejaVu Sans', Arial, sans-serif; fill: #4F5C55; }
      .section { font: 700 22px 'DejaVu Sans', Arial, sans-serif; fill: #213129; }
      .label { font: 700 18px 'DejaVu Sans', Arial, sans-serif; fill: #23342C; }
      .body { font: 400 16px 'DejaVu Sans', Arial, sans-serif; fill: #4B5A53; }
      .small { font: 400 14px 'DejaVu Sans', Arial, sans-serif; fill: #64736C; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="760" fill="url(#bg)"/>

  <text x="72" y="74" class="title">Interface Clustering Workflow</text>
  <text x="72" y="108" class="subtitle">Schematic view of how Immunex derives interface states from trajectory data</text>

  <!-- Input -->
  <rect x="72" y="170" rx="24" ry="24" width="250" height="130" fill="url(#card)" stroke="#C8D0C7" stroke-width="2" filter="url(#shadow)"/>
  <text x="104" y="214" class="label">Input Data</text>
  <text x="104" y="248" class="body">Trajectory</text>
  <text x="104" y="274" class="body">Topology</text>
  <text x="104" y="300" class="body">Reference structure</text>

  <!-- Semantic prep -->
  <rect x="402" y="150" rx="26" ry="26" width="320" height="170" fill="url(#card)" stroke="#BFD3C5" stroke-width="2" filter="url(#shadow)"/>
  <text x="438" y="196" class="section">Semantic Preparation</text>
  <rect x="438" y="220" rx="16" ry="16" width="248" height="36" fill="#E6EFE7"/>
  <text x="456" y="243" class="body">Chain identification</text>
  <rect x="438" y="268" rx="16" ry="16" width="248" height="36" fill="#E6EFE7"/>
  <text x="456" y="291" class="body">CDR detection</text>
  <text x="438" y="332" class="small">Produces chain mapping and CDR3 ranges</text>

  <!-- Interface definition -->
  <rect x="808" y="150" rx="26" ry="26" width="320" height="170" fill="url(#card)" stroke="#BFD3C5" stroke-width="2" filter="url(#shadow)"/>
  <text x="844" y="196" class="section">Define Interface Scope</text>
  <text x="844" y="234" class="body">CDR3α</text>
  <text x="844" y="260" class="body">CDR3β</text>
  <text x="844" y="286" class="body">Peptide</text>
  <text x="844" y="312" class="body">MHC groove (α1 / α2)</text>

  <!-- Features -->
  <rect x="1208" y="110" rx="30" ry="30" width="320" height="250" fill="url(#card)" stroke="#BFD3C5" stroke-width="2" filter="url(#shadow)"/>
  <text x="1244" y="156" class="section">Build Features</text>
  <rect x="1242" y="182" rx="18" ry="18" width="252" height="46" fill="#EAF1E4"/>
  <text x="1262" y="210" class="body">Geometry</text>
  <text x="1262" y="228" class="small">Backbone arrangement</text>
  <rect x="1242" y="242" rx="18" ry="18" width="252" height="46" fill="#E6EEF7"/>
  <text x="1262" y="270" class="body">Side-chain orientation</text>
  <text x="1262" y="288" class="small">Key side-chain directions</text>
  <rect x="1242" y="302" rx="18" ry="18" width="252" height="46" fill="#F2EBDD"/>
  <text x="1262" y="330" class="body">Contact pattern</text>
  <text x="1262" y="348" class="small">CDR3 ↔ peptide / groove contacts</text>

  <!-- Distance / clustering -->
  <rect x="384" y="430" rx="28" ry="28" width="360" height="170" fill="url(#card)" stroke="#C8D0C7" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="476" class="section">Combine &amp; Compare Frames</text>
  <text x="420" y="514" class="body">Weighted joint distance matrix</text>
  <text x="420" y="544" class="body">Hierarchical clustering</text>
  <text x="420" y="574" class="small">Geometry + side-chain + interaction</text>

  <!-- States -->
  <rect x="840" y="430" rx="28" ry="28" width="310" height="170" fill="url(#card)" stroke="#C8D0C7" stroke-width="2" filter="url(#shadow)"/>
  <text x="876" y="476" class="section">Interface States</text>
  <text x="876" y="514" class="body">Cluster labels</text>
  <text x="876" y="542" class="body">Dominant / minor states</text>
  <text x="876" y="570" class="body">State transitions over time</text>

  <!-- Outputs -->
  <rect x="1240" y="410" rx="30" ry="30" width="300" height="220" fill="url(#card)" stroke="#C8D0C7" stroke-width="2" filter="url(#shadow)"/>
  <text x="1276" y="456" class="section">Outputs</text>
  <text x="1276" y="494" class="body">Summary table</text>
  <text x="1276" y="522" class="body">Representative structures</text>
  <text x="1276" y="550" class="body">Time evolution plots</text>
  <text x="1276" y="578" class="body">Difference matrix</text>
  <text x="1276" y="606" class="body">State-specific signatures</text>

  <!-- Arrows -->
  <path d="M322 235 H388" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M722 235 H792" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1128 235 H1192" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1368 360 V392" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1208 520 H1168" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M840 515 H760" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M968 320 V410" stroke="#4E6A5A" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <rect x="72" y="666" rx="18" ry="18" width="1456" height="54" fill="#E7E0D1" stroke="#D6CCB7"/>
  <text x="102" y="700" class="body">Core idea: define the biologically relevant interface first, describe each frame with geometry + side-chain + contact features, then cluster frames into interpretable interface states.</text>
</svg>
